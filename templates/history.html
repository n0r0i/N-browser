<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <style>
        body { font-family: sans-serif; background-color: #2b2b2b; color: #f0f0f0; }
        h1 { color: #00aaff; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #00aaff; color: #2b2b2b;}
        a { color: #00aaff; }
    </style>
</head>
<body>
    <h1>History</h1>
    <a href="app:clear_history" style="color: #ff4444; text-decoration: none; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 5px;">Clear All History</a>
    <br><br>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>URL</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            {history_rows}
        </tbody>
    </table>
</body>
</html>
