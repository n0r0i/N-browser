<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>N-Browser</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Title Bar -->
        <div id="title-bar">
            <div id="tab-bar">
                <!-- Tabs will be dynamically inserted here by renderer.js -->
            </div>
            <button id="add-tab-button">+</button>
            <div id="window-controls">
                <button class="control-button" id="minimize-button">-</button>
                <button class="control-button" id="maximize-button">[]</button>
                <button class="control-button" id="close-button">X</button>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div id="nav-bar">
            <button class="nav-button" id="back-button">←</button>
            <button class="nav-button" id="forward-button">→</button>
            <button class="nav-button" id="reload-button">⟳</button>
            <input type="text" id="url-bar" placeholder="https://">
        </div>

        <!-- Content Area -->
        <div id="content-area">
            <!-- Webviews will be dynamically inserted here by renderer.js -->
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
