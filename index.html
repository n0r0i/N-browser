<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>N-Browser</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Title Bar -->
        <div id="title-bar">
            <div id="tab-bar">
                <!-- Tabs will be dynamically inserted here by renderer.js -->
            </div>
            <div id="window-controls">
                <button class="control-button" id="minimize-button"><i class="fas fa-minus"></i></button>
                <button class="control-button" id="maximize-button"><i class="far fa-square"></i></button>
                <button class="control-button" id="close-button"><i class="fas fa-times"></i></button>
            </div>
            <button id="add-tab-button" class="nav-button"><i class="fas fa-plus"></i></button>
        </div>

        <!-- Navigation Bar -->
        <div id="nav-bar">
            <button class="nav-button" id="back-button"><i class="fas fa-arrow-left"></i></button>
            <button class="nav-button" id="forward-button"><i class="fas fa-arrow-right"></i></button>
            <button class="nav-button" id="reload-button"><i class="fas fa-redo"></i></button>
            <input type="text" id="url-bar" placeholder="Search or enter address">
        </div>

        <!-- Content Area -->
        <div id="content-area">
            <!-- BrowserViews will be attached here by main.js -->
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
