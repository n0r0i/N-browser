<!DOCTYPE html>
<html>
<head>
    <title>Nova Aba</title>
    <style>
        body {
            background-color: #2E2E2E;
            color: #FFFFFF;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #top-left-container {
            position: absolute;
            top: 20px;
            left: 20px;
            text-align: left;
        }
        #time {
            font-size: 3em;
        }
        #weather {
            font-size: 1.2em;
        }
        #search-container {
            width: 50%;
            max-width: 600px;
        }
        #search-form {
            display: flex;
        }
        #search-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 1px solid #555;
            border-radius: 25px;
            background-color: #424242;
            color: #FFFFFF;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="top-left-container">
        <div id="time-container">
            <!-- Time will be injected here by JavaScript -->
            <span id="time">--:--</span>
        </div>
        <div id="weather-container">
            <!-- Weather will be injected here by JavaScript -->
            <span id="weather">--°C, Carregando...</span>
        </div>
    </div>

    <div id="search-container">
        <form id="search-form" action="https://www.google.com/search" method="get">
            <input type="text" id="search-input" name="q" placeholder="Pesquisar na web..." autofocus>
        </form>
    </div>
</body>
</html>
